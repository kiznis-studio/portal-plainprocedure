name: Build & Deploy to Mercury

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/${{ github.repository }}
  DOMAIN: plainprocedure.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Deploy to Mercury
        env:
          SSH_KEY: ${{ secrets.MERCURY_SSH_KEY }}
          MERCURY_HOST: ${{ secrets.MERCURY_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          SLUG="${REPO_NAME#portal-}"

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$MERCURY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/deploy_key docker-compose.titan.yml \
            "root@${MERCURY_HOST}:/opt/portals/${SLUG}/"

          echo "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "root@${MERCURY_HOST}" "\
            DCFG=\$(mktemp -d) && \
            docker --config \$DCFG login ghcr.io -u github-actions --password-stdin && \
            DELAY=30 && \
            for i in 1 2 3; do \
              flock -w 300 /tmp/titan-deploy.lock bash -c \"\
                docker --config \$DCFG pull ${IMAGE}:latest && \
                cd /opt/portals/${SLUG} && \
                docker compose -f docker-compose.titan.yml up -d --remove-orphans\" \
              && { echo \"Deploy ${SLUG} succeeded (attempt \$i)\"; \
                   docker image prune -f 2>/dev/null || true; \
                   rm -rf \$DCFG; exit 0; }; \
              echo \"Attempt \$i/3 failed, retrying in \${DELAY}s...\"; \
              docker image prune -f 2>/dev/null || true; \
              docker rmi ${IMAGE}:latest 2>/dev/null || true; \
              sleep \$DELAY; DELAY=\$((DELAY * 2)); \
            done && \
            rm -rf \$DCFG && \
            echo 'ERROR: Deploy failed after 3 attempts' && exit 1"

      - name: Notify search engines of content changes
        if: success() && env.DOMAIN != ''
        env:
          INDEXNOW_KEY: "766538bdafcc4bf2b8f3a2d4d4d0b9fa"
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          CONTENT_PATTERNS='src/pages/.*\.astro|src/components/.*\.astro|public/llms\.txt|public/robots\.txt|astro\.config\.mjs'
          SKIP_PATTERNS='health\.ts|ping\.ts|sitemap-.*\.ts|middleware\.ts|d1-adapter|disk-cache|memory-budget'

          # Try multiple diff methods for shallow clone compatibility
          CHANGED=""
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only "$BEFORE_SHA" HEAD 2>/dev/null || true)
          fi
          if [ -z "$CHANGED" ]; then
            CHANGED=$(git log -1 --name-only --pretty=format: 2>/dev/null || true)
          fi
          [ -z "$CHANGED" ] && echo "No diff available — skipping" && exit 0

          CONTENT_FILES=$(echo "$CHANGED" | grep -E "$CONTENT_PATTERNS" | grep -Ev "$SKIP_PATTERNS" || true)

          if [ -z "$CONTENT_FILES" ]; then
            echo "::notice::No content changes — search engine notification skipped"
            exit 0
          fi

          echo "Content changes detected:"
          echo "$CONTENT_FILES"

          URLS=""
          HAS_COMPONENT_CHANGE=false

          while IFS= read -r file; do
            if [[ "$file" == src/components/* ]]; then
              HAS_COMPONENT_CHANGE=true
              continue
            fi

            route="${file#src/pages/}"
            route="${route%.astro}"
            route="${route%.ts}"
            [[ "$route" == *"["* ]] && continue
            route="${route%/index}"
            [ -z "$route" ] && route=""

            URLS="${URLS}\"https://${DOMAIN}/${route}\","
          done <<< "$CONTENT_FILES"

          if [ "$HAS_COMPONENT_CHANGE" = true ]; then
            URLS="\"https://${DOMAIN}/\",${URLS}"
          fi

          echo "$CONTENT_FILES" | grep -q 'public/llms.txt' && URLS="${URLS}\"https://${DOMAIN}/llms.txt\","
          echo "$CONTENT_FILES" | grep -q 'public/robots.txt' && URLS="${URLS}\"https://${DOMAIN}/robots.txt\","
          echo "$CONTENT_FILES" | grep -q 'astro.config.mjs' && URLS="${URLS}\"https://${DOMAIN}/\","

          URLS=$(echo "$URLS" | tr ',' '\n' | sort -u | grep -v '^$' | paste -sd ',' -)
          [ -z "$URLS" ] && echo "No submittable URLs — skipping" && exit 0

          echo "Submitting to IndexNow: ${URLS}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"${DOMAIN}\",\"key\":\"${INDEXNOW_KEY}\",\"keyLocation\":\"https://${DOMAIN}/${INDEXNOW_KEY}.txt\",\"urlList\":[${URLS}]}" \
            || echo "000")
          echo "IndexNow response: HTTP ${HTTP_CODE}"
