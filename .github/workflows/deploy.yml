name: Build & Deploy to Mercury

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Deploy to Mercury
        env:
          SSH_KEY: ${{ secrets.MERCURY_SSH_KEY }}
          MERCURY_HOST: ${{ secrets.MERCURY_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          SLUG="${REPO_NAME#portal-}"

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$MERCURY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/deploy_key docker-compose.titan.yml \
            "root@${MERCURY_HOST}:/opt/portals/${SLUG}/"

          echo "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key "root@${MERCURY_HOST}" "\
            DCFG=\$(mktemp -d) && \
            docker --config \$DCFG login ghcr.io -u github-actions --password-stdin && \
            DELAY=30 && \
            for i in 1 2 3; do \
              flock -w 300 /tmp/titan-deploy.lock bash -c \"\
                docker --config \$DCFG pull ${IMAGE}:latest && \
                cd /opt/portals/${SLUG} && \
                docker compose -f docker-compose.titan.yml up -d --remove-orphans\" \
              && { echo \"Deploy ${SLUG} succeeded (attempt \$i)\"; \
                   docker image prune -f 2>/dev/null || true; \
                   rm -rf \$DCFG; exit 0; }; \
              echo \"Attempt \$i/3 failed, retrying in \${DELAY}s...\"; \
              docker image prune -f 2>/dev/null || true; \
              docker rmi ${IMAGE}:latest 2>/dev/null || true; \
              sleep \$DELAY; DELAY=\$((DELAY * 2)); \
            done && \
            rm -rf \$DCFG && \
            echo 'ERROR: Deploy failed after 3 attempts' && exit 1"
